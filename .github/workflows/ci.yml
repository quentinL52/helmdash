# =============================================================================
# CI Workflow: helmdash
# Trigger: PRs targeting main
#
# Branch protection note:
# This workflow is designed to be used alongside a GitHub branch protection
# rule on `main` that requires status checks (lint, typecheck, build) to pass
# before merging. Configure via Settings > Branches > Add rule > main.
#
# Security guard:
# - Fails if SUPABASE_SERVICE_ROLE_KEY appears in client-side components
#
# Steps:
#   1. npm ci (cached)  — clean, reproducible install
#   2. env.example check — verify env template exists
#   3. lint              — npm run lint (next lint)
#   4. typecheck         — npm run typecheck (tsc --noEmit)
#   5. test*             — skipped if no test script in package.json
#   6. build             — npm run build (next build)
#
# Test step is conditionally skipped using npm pkg get to check for the
# existence of a "test" script in package.json.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "::error file=.env.example::Missing .env.example file — create one from your environment variables."
            exit 1
          fi
          echo ".env.example found."

      - name: Check SERVICE_ROLE not in client code
        run: |
          FOUND=$(grep -r "SUPABASE_SERVICE_ROLE_KEY" src/components src/app/\(app\) 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY found in client-side code!"
            echo "$FOUND"
            exit 1
          fi
          echo "SERVICE_ROLE check passed."

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Check for test script
        id: check-test
        run: |
          if npm pkg get scripts.test 2>/dev/null | grep -q .; then
            echo "has_test=true" >> "$GITHUB_OUTPUT"
            echo "Test script found — will run tests."
          else
            echo "has_test=false" >> "$GITHUB_OUTPUT"
            echo "No test script found — skipping test step."
          fi

      - name: Run tests
        if: steps.check-test.outputs.has_test == 'true'
        run: npm test

      - name: Build project
        run: npm run build
